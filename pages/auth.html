<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — SkillCampus Pro</title>
  <link rel="stylesheet" href="../assets/css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="../assets/js/config.js"></script>
  <script defer src="../assets/js/i18n.js"></script>
  <script defer src="../assets/js/data.js"></script>
  <script defer src="../assets/js/app.js"></script>
</head>
<body data-page="auth">
  <main class="auth-shell">
    <a class="brand center-brand" href="../index.html"><span class="brand-mark">SC</span><span>SkillCampus Pro</span></a>
    <section class="auth-card">
      <div class="auth-tabs">
        <button class="tab-btn active" data-auth-tab="login">Login</button>
        <button class="tab-btn" data-auth-tab="signup">Sign up</button>
      </div>
      <form id="authForm" class="stack-form">
        <label><span>Name</span><input id="nameInput" type="text" placeholder="Aurilumix" autocomplete="name" /></label>
        <label><span>Email</span><input id="emailInput" type="email" placeholder="you@email.com" required autocomplete="email" /></label>
        <label><span>Password</span><input id="passwordInput" type="password" placeholder="••••••••" required minlength="6" autocomplete="current-password" /></label>
        <button class="primary-btn full" type="submit">Continue</button>
        <p id="authStatus" class="status-text"></p>
      </form>
      <p class="demo-note">Demo mode still opens the full product. Connect Supabase to persist real accounts.</p>
      <a class="secondary-btn full" href="dashboard.html">Open demo dashboard</a>
    </section>
  </main>
</body>
</html>
