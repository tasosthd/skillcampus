<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin command center — SkillCampus Pro</title><link rel="stylesheet" href="../assets/css/styles.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script defer src="../assets/js/config.js"></script><script defer src="../assets/js/i18n.js"></script><script defer src="../assets/js/data.js"></script><script defer src="../assets/js/app.js"></script></head><body data-page="admin"><div class="app-layout"><aside class="sidebar" data-sidebar></aside><main class="main-view"><header class="page-head"><div><p class="eyebrow">Operator panel</p><h1>Admin command center</h1><p class="subtitle">Manage content, monetization, reviews, moderation and growth metrics.</p></div><button class="primary-btn" data-open-mobile-nav>Menu</button></header><section class="content-shell"><div id="commandBar"></div><section id="adminMetrics" class="stats-grid"></section><section class="admin-grid"><form id="campusForm" class="padded stack-form"><div class="section-title"><h2>Create campus</h2></div><label><span>Campus title</span><input id="campusTitle" required></label><label><span>Description</span><textarea id="campusDescription" required></textarea></label><button class="primary-btn">Save campus</button><p id="campusStatus" class="status-text"></p></form><form id="lessonForm" class="padded stack-form"><div class="section-title"><h2>Create lesson</h2></div><label><span>Lesson title</span><input id="lessonTitle" required></label><label><span>Lesson content</span><textarea id="lessonContent" required></textarea></label><label class="switch-row"><input id="lessonPremium" type="checkbox"><span>Premium lesson</span></label><button class="primary-btn">Save lesson</button><p id="lessonStatus" class="status-text"></p></form></section><section class="admin-grid"><form id="resourceForm" class="padded stack-form"><div class="section-title"><
